name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FOUNDRY_PROFILE: ci

jobs:
  build-and-test:
    name: forge build + test + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show forge version
        run: forge --version

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test (ci profile — heavy fuzz/invariant runs)
        run: forge test -vvv

      - name: Gas snapshot check (deterministic tests only — fuzz gas is not reproducible across runs)
        run: forge snapshot --check --no-match-test "(testFuzz|invariant)"
